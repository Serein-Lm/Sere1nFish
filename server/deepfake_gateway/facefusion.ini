[paths]
temp_path = /data/temp
jobs_path = /data/jobs
output_path = /data/output

[face_selector]
face_selector_mode = one
face_selector_order = large-small

[face_masker]
face_mask_types = box
face_mask_blur = 0.3
face_mask_padding = 0 0 0 0

[output_creation]
output_image_quality = 92
output_video_encoder = libx264
output_video_preset = veryfast
output_video_quality = 90

[processors]
processors = face_swapper
face_swapper_model = hyperswap_1a_256
face_swapper_pixel_boost = 512x512
face_swapper_weight = 1.0

[uis]
open_browser = false
ui_layouts = default
ui_workflow = instant_runner

[download]
download_providers = huggingface github
download_scope = lite

[benchmark]
benchmark_mode = warm
benchmark_resolutions = 720p
benchmark_cycle_count = 3

[execution]
execution_device_ids = 0
execution_providers = cuda
execution_thread_count = 4

[memory]
video_memory_strategy = tolerant

[misc]
log_level = info
halt_on_error = true
